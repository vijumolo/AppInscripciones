<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>RegistroEventos</title>
  <script>
    window.onerror = function (message, source, lineno, colno, error) {
      console.log('REACT_CRASH:', message, error);
    };
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            brand: {
              50: '#f5f3ff',
              100: '#ede9fe',
              200: '#ddd6fe',
              300: '#c4b5fd',
              400: '#a78bfa',
              500: '#8b5cf6',
              600: '#7c3aed',
              700: '#6d28d9',
              800: '#5b21b6',
              900: '#4c1d95',
              950: '#2e1065',
            },
          }
        }
      }
    }
  </script>
  <style>
    body {
      background-color: #f8fafc;
      color: #0f172a;
      font-family: ui-sans-serif, system-ui, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", "Noto Color Emoji";
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      min-height: 100vh;
      background-image: radial-gradient(circle at top right, #ede9fe 0%, transparent 40%),
        radial-gradient(circle at bottom left, #ddd6fe 0%, transparent 40%);
      background-attachment: fixed;
    }

    .glass {
      background-color: rgb(255 255 255 / 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgb(255 255 255 / 0.2);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .glass-dark {
      background-color: rgb(15 23 42 / 0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgb(51 65 85 / 0.5);
      box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
    }

    .animate-fade-in {
      animation: fadeIn 0.5s ease-out forwards;
    }

    .animate-slide-up {
      animation: slideUp 0.5s ease-out forwards;
    }

    @keyframes fadeIn {
      0% {
        opacity: 0;
      }

      100% {
        opacity: 1;
      }
    }

    @keyframes slideUp {
      0% {
        transform: translateY(20px);
        opacity: 0;
      }

      100% {
        transform: translateY(0);
        opacity: 1;
      }
    }
  </style>
</head>

<body>
    <script>
      window.addEventListener('error', function(event) {
        document.body.innerHTML += '<div style="color:red; background:white; position:fixed; top:0; left:0; width:100vw; height:50vh; z-index:9999; padding:20px; font-family:monospace; overflow:auto;">❌ ERROR: ' + event.message + '<br/><pre>' + event.filename + ':' + event.lineno + '</pre></div>';
      });
    </script>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
